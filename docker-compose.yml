services:
  backend:
    build: ./backend
    image: scdf-backend
    container_name: scdf-backend
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    image: scdf-frontend
    container_name: scdf-frontend
    ports:
      - "5180:80"
    depends_on:
      - backend
    # Print the local URLs in the `docker compose up` output, then start nginx.
    command: >
      sh -c "echo '' &&
             echo '  ========================================================' &&
             echo '   SupplyChain IQ is running:' &&
             echo '     Dashboard (frontend) -> http://localhost:5180' &&
             echo '     API docs  (backend)  -> http://localhost:8000/docs' &&
             echo '  ========================================================' &&
             echo '' &&
             exec nginx -g 'daemon off;'"
